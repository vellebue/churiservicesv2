services:
  customers-db:
    image: postgres:16.13-alpine3.23
    container_name: customers-db
    environment:
      POSTGRES_DB: customers_db
      POSTGRES_USER: customers_user
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    networks:
      - churi-network
    volumes:
      - customers-db-data:/var/lib/postgresql/data

networks:
  churi-network:
    external: true

volumes:
  customers-db-data:
