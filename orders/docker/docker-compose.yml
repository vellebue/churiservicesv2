services:
  orders-db:
    image: postgres:16.13-alpine3.23
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: password
    ports:
      - "5438:5432"
    networks:
      - churi-network
    volumes:
      - orders-db-data:/var/lib/postgresql/data

networks:
  churi-network:
    external: true

volumes:
  orders-db-data:
