services:
  articles-db:
    image: postgres:16.13-alpine3.23
    container_name: articles-db
    environment:
      POSTGRES_DB: articles_db
      POSTGRES_USER: articles_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - churi-network
    volumes:
      - articles-db-data:/var/lib/postgresql/data

networks:
  churi-network:
    external: true

volumes:
  articles-db-data:
