spring:
  application:
    name: articles
  datasource:
    url: jdbc:postgresql://localhost:5436/articles_db
    username: articles_user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9080/realms/churiservicesv2
          jwk-set-uri: http://localhost:9080/realms/churiservicesv2/protocol/openid-connect/certs

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
